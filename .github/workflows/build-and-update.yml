name: Build and Update Manifests

on:
  push:
    branches: [main]

env:
  APP_IMAGE: ndzenyuy/lumia-app
  DB_IMAGE: ndzenyuy/lumia-db
  MANIFEST_REPO: git@github.com:Ndzenyuy/Project-4-Deploy-to-EKS-manifest-forked.git

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      short_sha: ${{ steps.short_sha.outputs.short_sha }}

    steps:
      - name: Checkout app repo
        uses: actions/checkout@v4

      - name: Set short SHA
        id: short_sha
        run: |
          echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV
          echo "short_sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - name: Build WAR
        run: mvn clean package -DskipTests

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push app image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Docker-files/app/Dockerfile
          push: true
          tags: |
            ${{ env.APP_IMAGE }}:${{ env.SHORT_SHA }}
            ${{ env.APP_IMAGE }}:latest

      - name: Build and push db image
        uses: docker/build-push-action@v5
        with:
          context: Docker-files/db
          file: Docker-files/db/Dockerfile
          push: true
          tags: |
            ${{ env.DB_IMAGE }}:${{ env.SHORT_SHA }}
            ${{ env.DB_IMAGE }}:latest

  update-manifests:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Set up SSH key for manifest repo
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.MANIFEST_REPO_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Clone manifest repo
        run: git clone ${{ env.MANIFEST_REPO }} manifest-repo

      - name: Update image tags in values.yaml
        run: |
          cd manifest-repo/helm/lumiatech
          sed -i "s|image: ndzenyuy/lumia-app:.*|image: ndzenyuy/lumia-app:${{ needs.build-and-push.outputs.short_sha }}|" values.yaml
          sed -i "s|image: ndzenyuy/lumia-db:.*|image: ndzenyuy/lumia-db:${{ needs.build-and-push.outputs.short_sha }}|" values.yaml

      - name: Commit and push manifest changes
        run: |
          cd manifest-repo
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add helm/lumiatech/values.yaml
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "ci: update image tags to ${{ needs.build-and-push.outputs.short_sha }}"
          git push

